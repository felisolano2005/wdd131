<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="It's an album with a list of my favorite LDS temples in the world">
    <meta name="author" content="Felipe Solano">
    <title>Temple Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Playfair+Display&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <h2>Temple Album</h2>

        <button id="menuButton">☰</button>

        <nav id="navMenu">
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>

    <main>
        <h1>Temple Gallery</h1>

        <div class="container">
            <figure> 
                <img src="images/albuquerque-temple.jpeg" alt="Albuquerque New Mexico Temple">
                <figcaption>Albuquerque New Mexico Temple</figcaption>
            </figure>

            <figure>
                <img src="images/arequipa-temple.jpeg" alt="Arequipa Peru Temple">
                <figcaption>Arequipa Peru Temple</figcaption>
            </figure>

            <figure>
                <img src="images/bangkok-temple.jpg" alt="Bangkok Thailand Temple">
                <figcaption>Bangkok Thailand Temple</figcaption>
            </figure>

            <figure>
                <img src="images/bern-temple.jpeg" alt="Bern Switzerland Temple">
                <figcaption>Bern Switzerland Temple</figcaption>
            </figure>

            <figure>
                <img src="images/bogota-temple.jpeg" alt="Bogota Colombia Temple">
                <figcaption>Bogota Colombia Temple</figcaption>
            </figure>

            <figure>
                <img src="images/boise-temple.png" alt="Boise Idaho Temple">
                <figcaption>Boise Idaho Temple</figcaption>
            </figure>

            <figure>
                <img src="images/brasilia-temple.jpg" alt="Brasilia Brazil Temple">
                <figcaption>Brasilia Brazil Temple</figcaption>
            </figure>

            <figure>
                <img src="images/copenhagen-temple.jpeg" alt="Copenhagen Denmark Temple">
                <figcaption>Copenhagen Denmark Temple</figcaption>
            </figure>

            <figure>
                <img src="images/freiberg-temple.jpeg" alt="Freiberg Germany Temple">
                <figcaption>Freiberg Germany Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Felipe Solano | Costa Rica</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
