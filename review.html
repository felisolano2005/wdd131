<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Submitted</title>
</head>
<body>

<h1>Thank You!</h1>
<p>Your review has been submitted.</p>

<p>Total Reviews Submitted: <span id="counter"></span></p>

<footer>
  <p>&copy; 2026 | Felipe Solano</p>
</footer>

<script>
  let count = localStorage.getItem("reviewCount");

  if (!count) {
    count = 0;
  }

  count++;
  localStorage.setItem("reviewCount", count);

  document.getElementById("counter").textContent = count;
</script>

</body>
</html>
