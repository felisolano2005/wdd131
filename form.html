<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review</title>
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js"></script>
</head>
<body>

<header>
  <h1>Product Review Form</h1>
</header>

<main>
  <form method="get" action="review.html">

    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <fieldset>
      <legend>Overall Rating</legend>

      <label><input type="radio" name="rating" id="r1" value="1" required> ☆</label>
      <label><input type="radio" name="rating" id="r2" value="2"> ☆☆</label>
      <label><input type="radio" name="rating" id="r3" value="3"> ☆☆☆</label>
      <label><input type="radio" name="rating" id="r4" value="4"> ☆☆☆☆</label>
      <label><input type="radio" name="rating" id="r5" value="5"> ☆☆☆☆☆</label>

    </fieldset>

    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

    <fieldset>
      <legend>Useful Features</legend>

      <label><input type="checkbox" id="feature1" name="features" value="Durability"> Durability</label>
      <label><input type="checkbox" id="feature2" name="features" value="Ease of Use"> Ease of Use</label>
      <label><input type="checkbox" id="feature3" name="features" value="Performance"> Performance</label>
      <label><input type="checkbox" id="feature4" name="features" value="Design"> Design</label>

    </fieldset>

    <label for="review">Written Review</label>
    <textarea id="review" name="review" rows="4"></textarea>

    <label for="username">User Name</label>
    <input type="text" id="username" name="username">

    <input type="submit" value="Submit Review">

  </form>
</main>

<footer>
  <p>&copy; 2026 | Felipe Solano | WDD Project</p>
</footer>


</body>
</html>
